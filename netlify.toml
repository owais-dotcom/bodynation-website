[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect /admin to Decap CMS
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

# Clean URLs
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  conditions = { Role = ["404"] }

[dev]
  command = "npm run dev"
  port    = 4321
